    <!-- Center Wrapper -->
    <div class="center-wrapper">
        <div class="container">
            <div class="logo">LinkSpark</div>
            <div class="subtitle">Shorten URLs with a golden touch</div>

            <form class="url-form" id="urlForm">
                <div class="input-group">
                    <input 
                        type="url" 
                        class="url-input" 
                        id="originalUrl" 
                        placeholder="Enter your long URL here..."
                        required
                    >
                </div>
                <button type="submit" class="shorten-btn" id="shortenBtn">
                    ✨ Shorten URL
                </button>
            </form>

            <div class="result-box" id="resultBox">
                <div class="result-title">Your Link is Ready!</div>

                <div class="url-info">
                    <div class="url-label">Original URL</div>
                    <div class="url-value" id="originalUrlDisplay">
                        https://example.com
                        <button class="copy-btn" onclick="copyToClipboard('originalUrlDisplay')">Copy</button>
                    </div>
                </div>

                <div class="url-info">
                    <div class="url-label">Shortened URL</div>
                    <div class="url-value" id="shortenedUrlDisplay">
                        https://lnk.spark/abc123
                        <button class="copy-btn" onclick="copyToClipboard('shortenedUrlDisplay')">Copy</button>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-number" id="clickCount">0</div>
                        <div class="stat-label">Total Clicks</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="createdDate">Today</div>
                        <div class="stat-label">Created</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        Made with ✨ for efficient link sharing
    </div>
